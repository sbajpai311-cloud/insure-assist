[build]
builder = "DOCKERFILE"
dockerfilePath = "services/bff/Dockerfile"

[deploy]
startCommand = "node dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "insure-assist-bff"
source = "services/bff"

[env]
NODE_ENV = "production"
